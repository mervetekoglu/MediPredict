<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediPredict | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <h1 class="logo">MediPredict.</h1>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/history">History</a></li>
            <li><a href="/login">Login</a></li>
            <li><a href="/login" class="logout-btn">Logout</a></li>
        </ul>
    </nav>

    <div class="main-container">
        <div class="login-box">
            <h2>Welcome Back!</h2>
            <p>Please login to your account to save your health records.</p>
            
            <form class="login-form" method="POST" action="/login" autocomplete="off">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="student@aydin.edu.tr" required>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="predict-btn">Login</button>
            </form>

            <div class="register-link">
                <p>Don't have an account? <a href="register.html">Sign up here</a></p>
            </div>
        </div>
    </div>

</body>
</html>
